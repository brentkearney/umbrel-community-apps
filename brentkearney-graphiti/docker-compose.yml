version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: brentkearney-graphiti_neo4j_1
      APP_PORT: 7474
      PROXY_AUTH_ADD: "false"

  neo4j:
    image: neo4j:5.26.0@sha256:5a015e53de1895e7eee1574ae0325cf8c4b89587222778108c594bdd45a474b5
    restart: on-failure
    ports:
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${APP_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_usage__report_enabled=false
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - ${APP_DATA_DIR}/data/neo4j:/data
    healthcheck:
      test: wget -q --spider http://localhost:7474 || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  graphiti-mcp:
    image: zepai/knowledge-graph-mcp:standalone@sha256:460bafb39439d99ff001ea6ef03efbe0bd5d9e6afe2655edf926da4fd9df97c5
    restart: on-failure
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - ${APP_DATA_DIR}/config/graphiti.env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${APP_PASSWORD}
      - MCP_API_KEY=${APP_PASSWORD}
      - CONFIG_PATH=/app/mcp/config/config.yaml
    volumes:
      - ${APP_DATA_DIR}/config/config.yaml:/app/mcp/config/config.yaml:ro
      - ${APP_DATA_DIR}/config/fastmcp-server.py:/app/mcp/.venv/lib/python3.11/site-packages/mcp/server/fastmcp/server.py:ro
    command: ["uv", "run", "--no-sync", "main.py", "--database-provider", "neo4j"]
