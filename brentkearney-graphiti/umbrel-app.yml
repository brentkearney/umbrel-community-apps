manifestVersion: 1
id: brentkearney-graphiti
name: Graphiti
tagline: Temporal knowledge graph with MCP for AI agents
icon: https://raw.githubusercontent.com/getzep/graphiti/main/images/graphiti-logo.svg
category: ai
version: "1.0.2"
port: 8000
description: >-
  Graphiti builds temporally-aware knowledge graphs for AI agents.
  It enables real-time incremental updates without batch recomputation,
  with built-in multi-user isolation via group_id.


  Features:
    - Built-in MCP server for direct AI agent integration
    - Temporal knowledge graph with bi-temporal edge tracking
    - Automatic entity extraction and deduplication
    - Hybrid search combining semantic, keyword, and graph traversal
    - Neo4j graph + vector storage (no separate vector DB needed)
    - Multi-user isolation via group_id
    - Supports OpenAI, Anthropic, Gemini, Groq, and OpenRouter
